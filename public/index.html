<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZOMO CHAT</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="auth-container" class="auth-container">
    <h1>ZOMO CHAT</h1>
    <form id="login-form">
      <h2>Вход</h2>
      <input type="text" id="login-nickname" placeholder="Никнейм" required>
      <input type="password" id="login-password" placeholder="Пароль" required>
      <button type="submit">Войти</button>
      <p>Нет аккаунта? <a href="#" id="show-register">Создать</a></p>
    </form>
    <form id="register-form" style="display:none">
      <h2>Регистрация</h2>
      <input type="text" id="reg-nickname" placeholder="Никнейм" required>
      <input type="password" id="reg-password" placeholder="Пароль" required>
      <button type="submit">Зарегистрироваться</button>
      <p>Есть аккаунт? <a href="#" id="show-login">Войти</a></p>
    </form>
    <div id="auth-message"></div>
  </div>

  <div id="chat-container" style="display:none">
    <div class="sidebar">
      <div class="user-info">
        <span id="current-nickname"></span>
        <span id="current-id"></span>
      </div>
      <div class="add-friend">
        <input type="text" id="friend-id-input" placeholder="ID друга">
        <button id="add-friend-btn">Добавить</button>
      </div>
      <div class="friends-list" id="friends-list"></div>
      <button id="logout-btn">Выйти</button>
    </div>
    <div class="chat-area">
      <div class="chat-header">
        <h3 id="chat-with-name">Выберите друга</h3>
        <span id="chat-with-status"></span>
      </div>
      <div class="messages-container" id="messages-container">
        <div class="empty-chat">Выберите чат</div>
      </div>
      <form id="message-form">
        <input type="text" id="message-input" placeholder="Сообщение..." disabled>
        <button type="submit" id="send-btn" disabled>Отправить</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
