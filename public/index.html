<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZOMO CHAT — Premium Messenger</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="app" class="app">
    <!-- Auth Container -->
    <div id="auth-container" class="auth-container glass-panel">
      <div class="auth-header">
        <h1 class="logo">ZOMO CHAT</h1>
        <p class="subhead">Премиальная связь в реальном времени</p>
      </div>
      <div id="auth-forms" class="auth-forms">
        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <h2 class="form-title">С возвращением</h2>
          <div class="input-group">
            <input type="text" id="login-nickname" placeholder="Никнейм" autocomplete="off" required>
          </div>
          <div class="input-group">
            <input type="password" id="login-password" placeholder="Пароль" required>
          </div>
          <button type="submit" class="btn-primary">Войти</button>
          <p class="form-footer">Нет аккаунта? <a href="#" id="show-register">Создать</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
          <h2 class="form-title">Создать аккаунт</h2>
          <div class="input-group">
            <input type="text" id="reg-nickname" placeholder="Никнейм" autocomplete="off" required>
          </div>
          <div class="input-group">
            <input type="password" id="reg-password" placeholder="Пароль" required>
          </div>
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
          <p class="form-footer">Уже есть аккаунт? <a href="#" id="show-login">Войти</a></p>
        </form>
      </div>
      <div id="auth-message" class="auth-message"></div>
    </div>

    <!-- Main Chat Container -->
    <div id="chat-container" class="chat-container" style="display: none;">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">
          <div class="user-profile">
            <div class="avatar" id="user-avatar">Z</div>
            <div class="user-info">
              <h3 id="current-nickname">Загрузка...</h3>
              <span class="user-id" id="current-id">ID: ...</span>
            </div>
          </div>
          <button id="logout-btn" class="icon-btn" title="Выйти">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
        <div class="search-section">
          <div class="input-group">
            <input type="text" id="friend-id-input" placeholder="Добавить друга по ID">
            <button id="add-friend-btn" class="icon-btn" title="Добавить друга">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4" />
                <path d="M5.3 18.3C6.8 16.5 9.2 15 12 15s5.2 1.5 6.7 3.3" />
                <line x1="12" y1="12" x2="12" y2="20" />
                <line x1="8" y1="16" x2="16" y2="16" />
              </svg>
            </button>
          </div>
        </div>
        <div class="friends-list" id="friends-list">
          <p style="color: var(--text-muted); text-align: center; padding: 20px;">Друзей пока нет.<br>Добавьте по ID выше.</p>
        </div>
        <div class="sidebar-footer">
          <p class="online-status">🔵 ZOMO CHAT — защищённое соединение</p>
        </div>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area glass-panel">
        <div id="chat-header" class="chat-header">
          <div class="chat-header-info">
            <h3 id="chat-with-name">Выберите друга</h3>
            <span id="chat-with-status" class="status-indicator"></span>
          </div>
        </div>
        <div id="messages-container" class="messages-container">
          <div class="empty-chat-message">
            <div class="empty-icon">💬</div>
            <h4>Нет сообщений</h4>
            <p>Начните общение</p>
          </div>
        </div>
        <form id="message-form" class="message-input-container">
          <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off" disabled>
          <button type="submit" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </form>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
