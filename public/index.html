<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZOMO CHAT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="app" class="app">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-container" class="auth-container">
      <div class="auth-header">
        <h1 class="logo">ZOMO CHAT</h1>
      </div>
      <div id="auth-forms">
        <form id="login-form" class="auth-form active">
          <h2>Вход</h2>
          <input type="text" id="login-nickname" placeholder="Никнейм" autocomplete="off" required>
          <input type="password" id="login-password" placeholder="Пароль" required>
          <button type="submit" class="btn-primary">Войти</button>
          <p class="form-footer">Нет аккаунта? <a href="#" id="show-register">Создать</a></p>
        </form>
        <form id="register-form" class="auth-form">
          <h2>Регистрация</h2>
          <input type="text" id="reg-nickname" placeholder="Никнейм" autocomplete="off" required>
          <input type="password" id="reg-password" placeholder="Пароль" required>
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
          <p class="form-footer">Есть аккаунт? <a href="#" id="show-login">Войти</a></p>
        </form>
      </div>
      <div id="auth-message"></div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-container" class="main-container" style="display: none;">
      <!-- КОНТЕНТ -->
      <div class="content-area">
        <!-- ЧАТЫ -->
        <div id="tab-chats" class="tab-content active">
          <div class="chats-container">
            <div class="friends-sidebar">
              <div class="sidebar-header">
                <h2>Сообщения</h2>
                <div class="add-friend-area">
                  <input type="text" id="friend-id-input" placeholder="ID друга">
                  <button id="add-friend-btn">🔍</button>
                </div>
              </div>
              <div class="friends-list" id="friends-list"></div>
            </div>
            <div class="chat-view" id="chat-view">
              <div class="chat-header">
                <button class="back-btn" id="back-to-friends">←</button>
                <div class="chat-header-info">
                  <img id="chat-avatar" class="chat-avatar" src="" alt="">
                  <div>
                    <h3 id="chat-with-name">Выберите чат</h3>
                    <span id="chat-with-status"></span>
                  </div>
                </div>
                <button id="call-btn" class="call-btn" style="display: none;">📞</button>
              </div>
              <div class="messages-container" id="messages-container">
                <div class="empty-chat">💬 Выберите чат</div>
              </div>
              <div class="message-input-area">
                <button id="attach-image-btn" class="attach-btn">+</button>
                <button id="voice-record-btn" class="attach-btn">🎤</button>
                <input type="text" id="message-input" placeholder="Сообщение..." disabled>
                <button id="send-btn" class="send-btn" disabled>➤</button>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
              </div>
            </div>
          </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-profile" class="tab-content">
          <div class="profile-container">
            <h2>Профиль</h2>
            <div class="profile-content">
              <div class="avatar-section">
                <img id="profile-avatar" class="profile-avatar" src="" alt="">
                <button id="change-avatar-btn" class="btn-secondary">📷 Сменить фото</button>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
              </div>
              <div class="profile-info">
  <div class="input-group">
    <label>Никнейм</label>
    <input type="text" id="profile-nickname" placeholder="Ваш никнейм">
  </div>
  <button id="save-nickname-btn" class="btn-small">💾 Сохранить никнейм</button>
  <p style="margin-top: 16px;">ID: <span id="profile-id"></span></p>
</div>
            </div>
          </div>
        </div>

        <!-- НАСТРОЙКИ -->
        <div id="tab-settings" class="tab-content">
          <div class="settings-container">
            <h2>Настройки</h2>
            <div class="setting-item">
              <span>Тема</span>
              <select id="theme-select">
                <option value="dark">Тёмная</option>
                <option value="light">Светлая</option>
              </select>
            </div>
            <div class="setting-item">
              <span>Уведомления</span>
              <button id="enable-notifications-btn" class="btn-secondary">🔔 Включить</button>
            </div>
            <button id="logout-btn" class="btn-danger">Выйти</button>
          </div>
        </div>

        <!-- ИСТОРИЯ ЗВОНКОВ -->
        <div id="tab-calls" class="tab-content">
          <div class="calls-container">
            <h2>История звонков</h2>
            <div class="calls-list" id="calls-list"></div>
          </div>
        </div>
      </div>

      <!-- НИЖНЕЕ МЕНЮ -->
      <nav class="bottom-menu">
        <div class="menu-item" data-tab="chats">
          <span class="menu-icon">💬</span>
          <span>Чаты</span>
          <span class="badge" id="chats-badge" style="display: none;">0</span>
        </div>
        <div class="menu-item" data-tab="calls">
          <span class="menu-icon">📞</span>
          <span>Звонки</span>
        </div>
        <div class="menu-item" data-tab="profile">
          <span class="menu-icon">👤</span>
          <span>Профиль</span>
        </div>
        <div class="menu-item" data-tab="settings">
          <span class="menu-icon">⚙️</span>
          <span>Настройки</span>
        </div>
      </nav>
    </div>

    <!-- МОДАЛКА ЗВОНКА -->
    <div id="call-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>📞 Входящий звонок</h2>
        <p id="caller-name"></p>
        <div class="call-buttons">
          <button id="accept-call-btn" class="call-accept">Принять</button>
          <button id="reject-call-btn" class="call-reject">Отклонить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
